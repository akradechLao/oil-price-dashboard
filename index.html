<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard ราคาน้ำมันประจำวัน</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛽</text></svg>">
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script>google.charts.load('current', {packages:['corechart']});</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh; color: #fff;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; padding: 30px 0 20px; }
    .header h1 {
      font-size: 2.2em;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header .date-display { font-size: 1.1em; color: #b8b8d4; }
    .status-bar {
      display: flex; justify-content: center; gap: 20px;
      margin: 15px 0 30px; flex-wrap: wrap;
    }
    .status-item {
      background: rgba(255,255,255,0.08); padding: 8px 18px;
      border-radius: 20px; font-size: 0.9em; backdrop-filter: blur(5px);
    }
    .status-item.ok { border: 1px solid #4caf50; color: #4caf50; }
    .status-item.warn { border: 1px solid #ff9800; color: #ff9800; }
    .station-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px; margin-bottom: 30px;
    }
    .station-card {
      background: rgba(255,255,255,0.06); border-radius: 16px; padding: 20px;
      backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .station-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .station-name {
      font-size: 1.3em; font-weight: bold; margin-bottom: 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .station-name .dot {
      width: 10px; height: 10px; border-radius: 50%; display: inline-block;
    }
    .fuel-list { list-style: none; }
    .fuel-list li {
      display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.92em;
    }
    .fuel-list li:last-child { border-bottom: none; }
    .fuel-name { color: #b8b8d4; }
    .fuel-price { font-weight: bold; color: #4fc3f7; }
    .summary-section {
      background: rgba(255,255,255,0.06); border-radius: 16px;
      padding: 25px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1);
    }
    .summary-section h2 { font-size: 1.3em; margin-bottom: 15px; color: #ffd200; }
    .summary-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .summary-item {
      background: rgba(255,255,255,0.05); padding: 15px;
      border-radius: 10px; text-align: center;
    }
    .summary-item .label { font-size: 0.85em; color: #b8b8d4; }
    .summary-item .value { font-size: 1.6em; font-weight: bold; color: #4fc3f7; }
    .chart-section {
      background: rgba(255,255,255,0.06); border-radius: 16px;
      padding: 25px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1);
    }
    .chart-section h2 { font-size: 1.3em; margin-bottom: 15px; color: #ffd200; }
    .chart-controls {
      display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
    }
    .chart-controls label { color: #b8b8d4; font-size: 0.9em; }
    .chart-controls select {
      background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 14px; border-radius: 8px; font-size: 0.9em; cursor: pointer;
    }
    .chart-controls select option { background: #24243e; color: #fff; }
    #chart_div {
      width: 100%; min-height: 400px; background: rgba(255,255,255,0.03);
      border-radius: 10px;
    }
    .chart-loading { text-align: center; padding: 60px; color: #b8b8d4; }
    .no-data { text-align: center; padding: 40px; color: #888; font-style: italic; }
    .action-bar { text-align: center; margin: 20px 0; }
    .btn {
      background: linear-gradient(90deg, #f7971e, #ffd200); color: #1a1a2e;
      border: none; padding: 12px 30px; border-radius: 25px;
      font-size: 1em; font-weight: bold; cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading { text-align: center; padding: 60px; font-size: 1.2em; color: #b8b8d4; }
    .spinner {
      border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #ffd200;
      border-radius: 50%; width: 40px; height: 40px;
      animation: spin 1s linear infinite; margin: 0 auto 15px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .footer { text-align: center; padding: 20px; color: #666; font-size: 0.85em; }
    .footer a { color: #4fc3f7; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⛽ ราคาน้ำมันประจำวัน</h1>
      <div class="date-display" id="dateDisplay">กำลังโหลด...</div>
    </div>
    <div class="status-bar">
      <div class="status-item ok" id="statusApi">● เชื่อมต่อแล้ว</div>
      <div class="status-item" id="statusData">ข้อมูลล่าสุด</div>
    </div>
    <div class="action-bar">
      <button class="btn" id="refreshBtn" onclick="loadData()">รีเฟรชข้อมูล</button>
    </div>
    <div class="summary-section">
      <h2>สรุปราคาเฉลี่ย (ปั๊มหลัก)</h2>
      <div class="summary-grid" id="summaryGrid"></div>
    </div>
    <div class="station-grid" id="stationGrid">
      <div class="loading"><div class="spinner"></div>กำลังโหลดข้อมูล...</div>
    </div>
    <div class="chart-section">
      <h2>📈 แนวโน้มราคาย้อนหลัง</h2>
      <div class="chart-controls">
        <label>ชนิดน้ำมัน:</label>
        <select id="fuelSelect" onchange="loadChart()">
          <option value="gasohol_95">แก๊สโซฮอล์ 95</option>
          <option value="gasohol_91">แก๊สโซฮอล์ 91</option>
          <option value="gasohol_e20">แก๊สโซฮอล์ E20</option>
          <option value="diesel">ดีเซล</option>
          <option value="premium_diesel">ดีเซลพรีเมียม</option>
          <option value="gasoline_95">เบนซิน 95</option>
        </select>
      </div>
      <div id="chart_div">
        <div class="chart-loading"><div class="spinner"></div>กำลังโหลดข้อมูลกราฟ...</div>
      </div>
    </div>
    <div class="footer">
      ข้อมูลจาก <a href="https://github.com/max180643/thai-oil-api">Thai Oil API</a>
      | อัปเดตอัตโนมัติทุกวัน 07:00 น.
    </div>
  </div>

  <script>
    // ===== CONFIG =====
    var API_URL = 'https://api.chnwt.dev/thai-oil-api/latest';
    var SHEET_ID = '1su1DwSOwjr1Z9Tm1Uc9TBwa8O3bDsDJa3GE9hutoksg';
    var SHEET_NAME = 'ราคาน้ำมัน';
    var SHEETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(SHEET_NAME);

    var stationDisplayNames = {
      'ptt':'PTT','bcp':'PTT/BCP','shell':'Shell','esso':'Esso',
      'caltex':'Caltex','irpc':'IRPC','pt':'PT','susco':'Susco',
      'pure':'Pure','susco_dealers':'Susco Dealers'
    };
    var stationColors = {
      'ptt':'#f44336','bcp':'#4caf50','shell':'#ffd600','esso':'#ff5722',
      'caltex':'#2196f3','pt':'#9c27b0','susco':'#00bcd4','pure':'#795548',
      'irpc':'#607d8b','susco_dealers':'#00bcd4'
    };
    var fuelOrder = [
      'gasohol_e20','gasohol_91','gasohol_95','diesel','diesel_b7',
      'diesel_b20','premium_diesel','gasoline_95','premium_gasohol_95',
      'superpower_gasohol_95','vpower_gasohol_95','vpower_diesel'
    ];

    // ===== โหลดข้อมูลราคาล่าสุด =====
    function loadData() {
      var btn = document.getElementById('refreshBtn');
      btn.disabled = true; btn.textContent = 'กำลังโหลด...';
      document.getElementById('statusApi').textContent = '● กำลังเชื่อมต่อ...';
      document.getElementById('statusApi').className = 'status-item';

      fetch(API_URL)
        .then(function(res) { return res.json(); })
        .then(function(data) {
          renderDashboard(data);
          btn.disabled = false; btn.textContent = 'รีเฟรชข้อมูล';
          document.getElementById('statusApi').textContent = '● เชื่อมต่อแล้ว';
          document.getElementById('statusApi').className = 'status-item ok';
          loadChart();
        })
        .catch(function(err) {
          document.getElementById('stationGrid').innerHTML =
            '<div class="loading">ผิดพลาด: ' + err.message + '</div>';
          btn.disabled = false; btn.textContent = 'รีเฟรชข้อมูล';
          document.getElementById('statusApi').textContent = '● เชื่อมต่อไม่ได้';
          document.getElementById('statusApi').className = 'status-item warn';
        });
    }

    function renderDashboard(data) {
      if (data.status !== 'success') {
        document.getElementById('stationGrid').innerHTML =
          '<div class="loading">ไม่สามารถดึงข้อมูลได้</div>';
        return;
      }
      document.getElementById('dateDisplay').textContent = data.response.date;
      document.getElementById('statusData').textContent = 'อัปเดต: ' + data.response.date;

      var gridHtml = '';
      Object.keys(data.response.stations).forEach(function(key) {
        var name = stationDisplayNames[key] || key;
        var color = stationColors[key] || '#4fc3f7';
        var fuels = data.response.stations[key];
        gridHtml += '<div class="station-card"><div class="station-name"><span class="dot" style="background:' + color + '"></span>' + name + '</div><ul class="fuel-list">';
        fuelOrder.forEach(function(fk) {
          if (fuels[fk])
            gridHtml += '<li><span class="fuel-name">' + fuels[fk].name + '</span><span class="fuel-price">' + fuels[fk].price + ' ฿</span></li>';
        });
        gridHtml += '</ul></div>';
      });
      document.getElementById('stationGrid').innerHTML = gridHtml;
      renderSummary(data.response.stations);
    }

    function renderSummary(stations) {
      var fuelLabels = {
        'gasohol_91':'แก๊สโซฮอล์ 91','gasohol_95':'แก๊สโซฮอล์ 95',
        'gasohol_e20':'แก๊สโซฮอล์ E20','diesel':'ดีเซล','premium_diesel':'ดีเซลพรีเมียม'
      };
      var html = '';
      ['gasohol_91','gasohol_95','gasohol_e20','diesel','premium_diesel'].forEach(function(fk) {
        var sum = 0, count = 0;
        Object.keys(stations).forEach(function(sk) {
          if (stations[sk][fk]) { sum += parseFloat(stations[sk][fk].price); count++; }
        });
        if (count > 0)
          html += '<div class="summary-item"><div class="label">' + fuelLabels[fk] + '</div><div class="value">' + (sum / count).toFixed(2) + '</div></div>';
      });
      document.getElementById('summaryGrid').innerHTML = html;
    }

    // ===== โหลดกราฟย้อนหลังจาก Google Sheets =====
    function loadChart() {
      var fuelType = document.getElementById('fuelSelect').value;
      var chartDiv = document.getElementById('chart_div');
      chartDiv.innerHTML = '<div class="chart-loading"><div class="spinner"></div>กำลังโหลดข้อมูลกราฟ...</div>';

      fetch(SHEETS_CSV_URL)
        .then(function(res) {
          if (!res.ok) throw new Error('ไม่สามารถเข้าถึง Google Sheets ได้ — กรุณา Publish Sheet ออกมา');
          return res.text();
        })
        .then(function(csvText) {
          var history = parseCSV(csvText);
          if (!history || history.length < 2) {
            chartDiv.innerHTML = '<div class="no-data">ยังไม่มีข้อมูลย้อนหลังเพียงพอ (ต้องมีอย่างน้อย 2 วัน)</div>';
            return;
          }
          renderChart(history, fuelType);
        })
        .catch(function(err) {
          chartDiv.innerHTML = '<div class="no-data">' + err.message + '</div>';
        });
    }

    function parseCSV(csvText) {
      var lines = csvText.split('\n').filter(function(l) { return l.trim() !== ''; });
      if (lines.length < 2) return [];

      var headers = parseCSVLine(lines[0]);
      var fuelOrder = [
        'gasoline_95','gasohol_95','gasohol_91','gasohol_e20','gasohol_e85',
        'diesel','diesel_b7','diesel_b20','premium_diesel',
        'premium_gasohol_95','superpower_gasohol_95','vpower_gasohol_95',
        'vpower_diesel','vpower_diesel_b7','premium_gasohol_97','ngv'
      ];
      var stationOrder = ['ptt','bcp','shell','esso','caltex','irpc','pt','susco','pure','susco_dealers'];

      var rows = [];
      for (var i = 1; i < lines.length; i++) {
        var cols = parseCSVLine(lines[i]);
        var entry = { date: cols[0] };
        var colIndex = 2;
        stationOrder.forEach(function(station) {
          fuelOrder.forEach(function(fuel) {
            var key = station + '_' + fuel;
            var val = cols[colIndex] ? parseFloat(cols[colIndex]) : null;
            entry[key] = isNaN(val) ? null : val;
            colIndex++;
          });
        });
        rows.push(entry);
      }
      return rows;
    }

    function parseCSVLine(line) {
      var result = [];
      var current = '';
      var inQuotes = false;
      for (var i = 0; i < line.length; i++) {
        var c = line[i];
        if (c === '"') { inQuotes = !inQuotes; }
        else if (c === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
        else { current += c; }
      }
      result.push(current.trim());
      return result;
    }

    function renderChart(history, fuelType) {
      google.charts.setOnLoadCallback(function() {
        var stationOrder = ['ptt','bcp','shell','esso','caltex'];
        var stationNames = {'ptt':'PTT','bcp':'PTT/BCP','shell':'Shell','esso':'Esso','caltex':'Caltex'};
        var colors = ['#f44336','#4caf50','#ffd600','#ff5722','#2196f3'];

        var DataTable = new google.visualization.DataTable();
        DataTable.addColumn('string', 'วันที่');
        stationOrder.forEach(function(s) { DataTable.addColumn('number', stationNames[s]); });

        var rows = history.map(function(entry) {
          var row = [entry.date];
          stationOrder.forEach(function(station) {
            row.push(entry[station + '_' + fuelType] || null);
          });
          return row;
        });
        DataTable.addRows(rows);

        var options = {
          backgroundColor: 'transparent',
          legend: { textStyle: { color: '#b8b8d4', fontSize: 12 } },
          hAxis: { textStyle: { color: '#b8b8d4' }, gridlines: { color: 'rgba(255,255,255,0.05)' }, slantedText: true },
          vAxis: { textStyle: { color: '#b8b8d4' }, gridlines: { color: 'rgba(255,255,255,0.08)' }, format: '#.##' },
          curveType: 'function', pointSize: 5,
          chartArea: { left: 60, right: 30, top: 20, bottom: 80 },
          width: '100%', height: 400, colors: colors
        };

        var chart = new google.visualization.LineChart(document.getElementById('chart_div'));
        chart.draw(DataTable, options);
      });
    }

    // ===== เริ่มต้น =====
    loadData();
  </script>
</body>
</html>
